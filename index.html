<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ping Pong Pro</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; transition: background 0.05s; }
        #status { font-size: 2rem; text-align: center; font-weight: bold; }
        button { padding: 25px 50px; font-size: 1.5rem; background: #ff4757; color: white; border: none; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status">READY?</div>
    <button id="startBtn">START</button>

    <script>
    const NORMAL_THRESHOLD = 55; // 基礎門檻
    const SMASH_THRESHOLD = 125;  // 殺球門檻
    let lastTrigger = 0;
    let audioCtx, normalHitBuffer, smashHitBuffer;
    
    // 用於延遲判定的變數
    let highestForce = 0;
    let checkTimeout = null;

    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');

    async function loadSound(url) {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        return await audioCtx.decodeAudioData(arrayBuffer);
    }

    startBtn.addEventListener('click', async () => {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        
        // 預設檔案已存在於儲存庫
        normalHitBuffer = await loadSound('PINPON.m4a');
        smashHitBuffer = await loadSound('smash.m4a');

        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            const permission = await DeviceMotionEvent.requestPermission();
            if (permission === 'granted') run();
        } else {
            run();
        }
    });

    function run() {
        startBtn.style.display = 'none';
        status.innerText = "GO!";

        window.addEventListener('devicemotion', (event) => {
            const acc = event.acceleration;
            if (!acc) return;

            // 計算當前瞬間的總力道
            const force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            const now = Date.now();

            // 如果力道超過基本門檻，且不在 250ms 的冷卻期內
            if (force > SMASH_THRESHOLD && now - lastTrigger > 250) {
                
                // 更新這一段觀察期內的最高力道
                if (force > highestForce) {
                    highestForce = force;
                }

                // 如果還沒開始「觀察窗」，就啟動一個 50 毫秒的計時
                if (!checkTimeout) {
                    checkTimeout = setTimeout(() => {
                        
                        // --- 50 毫秒時間到，進行最終裁決 ---
                        if (highestForce > SMASH_THRESHOLD) {
                            hit("smash");
                        } else {
                            hit("normal");
                        }

                        // 裁決完畢，更新狀態
                        lastTrigger = Date.now();
                        highestForce = 0;
                        checkTimeout = null;
                        
                    }, 50); // 這 50ms 是等待加速度爬升到頂峰的關鍵時間
                }
            }
        });
    }

    function hit(type) {
        const source = audioCtx.createBufferSource();
        source.buffer = (type === "smash") ? smashHitBuffer : normalHitBuffer;
        source.connect(audioCtx.destination);
        source.start(0);

        if (type === "smash") {
            if (navigator.vibrate) navigator.vibrate([200, 50, 100]);
            status.innerHTML = "<span style='color:red;'>SUPER SMASH!</span>";
            document.body.style.backgroundColor = "white"; 
        } else {
            if (navigator.vibrate) navigator.vibrate(90);
            status.innerText = "PING";
            document.body.style.backgroundColor = "#444";
        }

        setTimeout(() => {
            document.body.style.backgroundColor = "#1a1a1a";
        }, 100);
    }
</script>
</body>
</html>
