<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ping Pong Pro</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; transition: background 0.05s; }
        #status { font-size: 2rem; text-align: center; font-weight: bold; }
        button { padding: 25px 50px; font-size: 1.5rem; background: #ff4757; color: white; border: none; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status">READY?</div>
    <button id="startBtn">START</button>

    <script>
        const NORMAL_THRESHOLD = 30; 
        const SMASH_THRESHOLD = 55; // 稍微下修，讓殺球更有快感
        let lastTrigger = 0;
        let audioCtx, normalHitBuffer, smashHitBuffer;

        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');

        // 極簡化載入
        async function loadSound(url) {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            return await audioCtx.decodeAudioData(arrayBuffer);
        }

        startBtn.addEventListener('click', async () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            // 直接抓取檔案
            normalHitBuffer = await loadSound('PINPON.m4a');
            smashHitBuffer = await loadSound('smash.m4a');

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission === 'granted') run();
            } else {
                run();
            }
        });

        function run() {
            startBtn.style.display = 'none';
            status.innerText = "GO!";

            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration;
                if (!acc) return;

                const force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                const now = Date.now();

                // 判斷邏輯：優先判斷殺球
                if (now - lastTrigger > 300) { // 冷卻時間稍微縮短，增加連擊感
                    if (force > SMASH_THRESHOLD) {
                        hit("smash");
                        lastTrigger = now;
                    } else if (force > NORMAL_THRESHOLD) {
                        hit("normal");
                        lastTrigger = now;
                    }
                }
            });
        }

        function hit(type) {
            const source = audioCtx.createBufferSource();
            source.buffer = (type === "smash") ? smashHitBuffer : normalHitBuffer;
            source.connect(audioCtx.destination);
            source.start(0);

            if (type === "smash") {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                status.innerHTML = "<span style='color:red;'>SMASH!</span>";
                document.body.style.backgroundColor = "white"; // 殺球時背景閃白，視覺衝擊更強
            } else {
                if (navigator.vibrate) navigator.vibrate(30);
                status.innerText = "PING";
                document.body.style.backgroundColor = "#444";
            }

            setTimeout(() => {
                document.body.style.backgroundColor = "#1a1a1a";
            }, 100);
        }
    </script>
</body>
</html>
