<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速乒乓模擬器</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; }
        #status { font-size: 1.2rem; text-align: center; margin-bottom: 20px; color: #00ff00; }
        button { padding: 25px 50px; font-size: 1.5rem; background: #ff4757; color: white; border: none; border-radius: 10px; box-shadow: 0 5px #ff6b81; cursor: pointer; }
        button:active { transform: translateY(3px); box-shadow: 0 2px #ff6b81; }
        .hint { margin-top: 20px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div id="status">準備擊球</div>
    <button id="startBtn">點擊開始 (啟動音訊)</button>
    <div class="hint">iOS 不支援震動，Android 支援</div>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        
        // 使用 Web Audio API 解決傳統 <audio> 的延遲問題
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let hitBuffer;

        // 預載入音訊檔案
        async function loadSound(url) {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            return await audioCtx.decodeAudioData(arrayBuffer);
        }

        startBtn.addEventListener('click', async () => {
            audioCtx = new AudioContext();
            // 使用更清脆、起頭極快的音效
            hitBuffer = await loadSound('PINPON.m4a');
            
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission === 'granted') initSensor();
            } else {
                initSensor();
            }
            
            startBtn.style.display = 'none';
            status.innerText = "感測中... 用力揮動！";
        });

        function playHitSound() {
            if (!hitBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = hitBuffer;
            source.connect(audioCtx.destination);
            source.start(0); // 幾乎 0 延遲播放
        }

        function initSensor() {
            let lastTrigger = 0;
            const THRESHOLD = 10; // 靈敏度，可依據手機狀況調整

            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration;
                if (!acc) return;

                const force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

                if (force > THRESHOLD) {
                    const now = Date.now();
                    if (now - lastTrigger > 300) { // 縮短冷卻時間至 150ms
                        triggerEffect();
                        lastTrigger = now;
                    }
                }
            });
        }

        function triggerEffect() {
            // 1. 播放音效 (Web Audio API)
            playHitSound();

            // 2. 震動 (Android 加強版)
            if (navigator.vibrate) {
                // 產生一個短促強烈的震動
                navigator.vibrate([100]); 
            }

            // 3. 視覺回饋
            status.innerText = "砰！";
            document.body.style.backgroundColor = "#333";
            setTimeout(() => {
                document.body.style.backgroundColor = "#1a1a1a";
                status.innerText = "感測中...";
            }, 100);
        }
    </script>
</body>
</html>
