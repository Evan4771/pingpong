<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業乒乓模擬器</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #status { font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: #bdc3c7; line-height: 1.6; }
        .btn-container { position: relative; z-index: 10; }
        button { padding: 20px 40px; font-size: 1.4rem; background: #e67e22; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 0 #d35400; active: transform: translateY(4px); transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 4px 0 #d35400; }
        .paddle { width: 120px; height: 120px; border: 8px solid #e74c3c; border-radius: 50%; margin-top: 20px; display: none; position: relative; }
        .paddle::after { content: ''; position: absolute; bottom: -40px; left: 45px; width: 30px; height: 60px; background: #95a5a6; border-radius: 5px; }
        .hit { animation: flash 0.15s ease-out; }
        @keyframes flash { 0% { background: transparent; } 50% { background: rgba(255,255,255,0.8); transform: scale(1.2); } 100% { background: transparent; } }
    </style>
</head>
<body>

    <div id="status">準備進入比賽？<br>請先開啟手機聲音並解除靜音</div>
    
    <div class="btn-container">
        <button id="startBtn">進入球場</button>
    </div>

    <div id="paddle" class="paddle"></div>

    <audio id="hitSound" src="PINPON.m4a" preload="auto"></audio>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const paddle = document.getElementById('paddle');
        const hitSound = document.getElementById('hitSound');

        // 參數設定
        const THRESHOLD = 15; // 觸發力道
        let lastTime = 0;

        startBtn.addEventListener('click', async () => {
            // 預熱音效 (修正 iOS 靜音問題)
            hitSound.play().then(() => { hitSound.pause(); hitSound.currentTime = 0; });

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission === 'granted') startApp();
            } else {
                startApp();
            }
        });

        function startApp() {
            startBtn.parentElement.style.display = 'none';
            paddle.style.display = 'block';
            status.innerHTML = "🏓 握緊手機！<br>模擬揮拍動作試試看";

            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration;
                if (!acc) return;

                // 計算瞬時總加速度
                const force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

                if (force > THRESHOLD) {
                    const now = Date.now();
                    if (now - lastTime > 250) { // 冷卻時間，避免一次揮拍多次響聲
                        triggerHit();
                        lastTime = now;
                    }
                }
            });
        }

        function triggerHit() {
            // 1. 播放真實球聲
            hitSound.currentTime = 0;
            hitSound.play();

            // 2. 觸覺震動 (Android 專屬)
            if (navigator.vibrate) navigator.vibrate(40);

            // 3. 視覺特效
            paddle.classList.remove('hit');
            void paddle.offsetWidth; 
            paddle.classList.add('hit');
        }
    </script>
</body>
</html>
